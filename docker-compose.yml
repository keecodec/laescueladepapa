services:
  db:
    image: mysql:8.0
    container_name: gcs_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      backend:

  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: gcs_api
    environment:
      - FLASK_APP=app.py
      - FLASK_ENV=${FLASK_ENV:-production}
      - DB_HOST=db
      - DB_USER=${MYSQL_USER}
      - DB_PASSWORD=${MYSQL_PASSWORD}
      - DB_NAME=${MYSQL_DATABASE}
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./api:/app
    depends_on:
      - db
    networks:
      backend:
      frontend:

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: gcs_client
    ports:
      - "5173:5173"
    volumes:
      - ./client:/usr/src/app
      - /usr/src/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - api
    networks:
      frontend:

networks:
  backend:
    driver: bridge
  frontend:
    driver: bridge

volumes:
  db_data:
