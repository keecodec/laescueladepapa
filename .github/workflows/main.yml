name: DevSecOps Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  # Étape 1 : Analyse Statique et de Composition (SAST / SCA)
  security-static-analysis:
    name: Pre-Build Security (Lint, SCA, SAST)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v5

      - name: Configuration de Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Installation des dépendances de sécurité
        run: |
          python -m pip install --upgrade pip
          pip install flake8 safety bandit

      # 1. Linting qualité de code
      - name: Linting (Flake8)
        run: |
          # Vérifie les erreurs de syntaxe graves dans le backend
          flake8 api/ --count --select=E9,F63,F7,F82 --show-source --statistics

      # 2. Software Composition Analysis (SCA)
      - name: Vérification des CVE (Safety)
        run: |
          # Vérifie si le Backend utilise des librairies vulnérables
          safety check -r api/requirements.txt

      # 3. Static Application Security Testing (SAST)
      - name: Analyse de code source (Bandit)
        run: |
          # Scanner Python cherchant des failles classiques (injections, secrets en dur, etc.)
          bandit -r api/ -ll -ii

  # Étape 2 : Build Docker, Déploiement CI et Scan Dynamique (DAST)
  build-and-dast:
    name: Build & DAST Scanner (OWASP ZAP)
    needs: security-static-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v5

      # 4. Build Docker (Test d'intégration)
      - name: Démarrage de l'infrastructure Docker
        run: |
          docker compose up -d --build
          # Attente pour s'assurer que l'API Flask et React Vite sont prêts
          sleep 15

      # 5. Dynamic Application Security Testing (DAST)
      - name: Scan DAST (OWASP ZAP Baseline)
        uses: zaproxy/action-baseline@v0.15.0
        with:
          # Cible l'application React hébergée localement sur le conteneur cible. 
          # Note: l'IP réseau par défaut du host depuis un conteneur docker sous Linux est souvent 172.17.0.1
          target: 'http://172.17.0.1:5173/'
          fail_action: false # Autoriser la pipeline à passer même s'il trouve des failles mineures au début
          allow_issue_writing: false
          
      - name: Nettoyage et arrêt
        if: always()
        run: docker compose down
